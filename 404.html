<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motivation</title>
  <!-- Boot breadcrumbs. This inline script runs before the app module, so it
       records document-load state even when the module never executes — the
       black-screen-on-resume failure leaves zero app logs. Breadcrumbs are
       stashed in localStorage ('boot_breadcrumbs') and shipped by
       flushBootBreadcrumbs() on the next successful boot. __BOOT_SERVED_AS is
       rewritten to '404' in the generated 404.html (vite spa-404-fallback
       plugin) so a host SPA-fallback load is distinguishable from a real
       /index.html load. See design_log #156. -->
  <script>window.__BOOT_SERVED_AS = '404';</script>
  <script>
    (function () {
      var KEY = 'boot_breadcrumbs';
      var MAX = 30;
      function append(extra) {
        try {
          var buf;
          try { buf = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch (e) { buf = []; }
          if (!Array.isArray(buf)) buf = [];
          var t = '';
          try { t = Temporal.Now.instant().toString(); } catch (e) { t = ''; }
          var crumb = { t: t, href: location.href, servedAs: window.__BOOT_SERVED_AS || 'index' };
          for (var k in extra) { if (Object.prototype.hasOwnProperty.call(extra, k)) crumb[k] = extra[k]; }
          buf.push(crumb);
          if (buf.length > MAX) buf = buf.slice(buf.length - MAX);
          localStorage.setItem(KEY, JSON.stringify(buf));
        } catch (e) { /* never let telemetry break boot */ }
      }
      var nav = null;
      try { nav = performance.getEntriesByType('navigation')[0] || null; } catch (e) { nav = null; }
      append({
        kind: 'load',
        navType: nav ? nav.type : 'unknown',
        isolated: !!self.crossOriginIsolated,
        hasController: !!(navigator.serviceWorker && navigator.serviceWorker.controller),
        online: navigator.onLine
      });
      // Resource/script load failures (e.g. the app module 404ing) fire 'error'
      // on the element and do NOT bubble — the capture phase is required.
      window.addEventListener('error', function (ev) {
        var target = ev && ev.target;
        if (target && target.tagName) {
          append({ kind: 'resource-error', tag: target.tagName, url: target.src || target.href || '' });
        }
      }, true);
    })();
  </script>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="apple-touch-icon" href="/icon.png">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
  <script type="module" crossorigin src="/assets/app-C25D66iV.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/preload-helper-zJ_50EbN.js">
  <link rel="modulepreload" crossorigin href="/assets/uuid-BofLEMA4.js">
  <link rel="modulepreload" crossorigin href="/assets/client-log-store-YQoiEp5r.js">
  <link rel="modulepreload" crossorigin href="/assets/component-logger-vUiJPJw3.js">
  <link rel="modulepreload" crossorigin href="/assets/client-log-buffer-BfOVSDKH.js">
  <link rel="stylesheet" crossorigin href="/assets/app-Dx5zpbYD.css">
</head>

<body>
  <div id="app">
    <main id="route-outlet"></main>

    <div id="loading-indicator" class="hidden">Loading...</div>

    <dialog id="goal-dialog">
      <form method="dialog" id="goal-form">
        <h2 id="dialog-title">Create Goal</h2>
        <input type="hidden" name="id" id="goal-id">
        <input type="hidden" name="parent_id" id="goal-parent-id">

        <div class="form-group">
          <label for="goal-title-input">Title</label>
          <input type="text" name="title" id="goal-title-input" required>
        </div>

        <div class="form-group">
          <label for="goal-status-input">Status</label>
          <select name="status" id="goal-status-input">
            <option value="ACTIVE">Active</option>
            <option value="ON_HOLD">On Hold</option>
            <option value="COMPLETED">Completed</option>
            <option value="ARCHIVED">Archived</option>
          </select>
        </div>

        <div class="form-group">
          <label for="goal-desc-input">Description</label>
          <textarea name="description" id="goal-desc-input"></textarea>
        </div>

        <div class="dialog-actions">
          <button value="cancel" formnovalidate>Cancel</button>
          <button value="save" class="btn-primary">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="confirm-dialog">
      <form method="dialog">
        <p id="confirm-message">Are you sure?</p>
        <div class="dialog-actions">
          <button value="cancel">Cancel</button>
          <button value="confirm" class="btn-danger">Delete</button>
        </div>
      </form>
    </dialog>

    <dialog id="status-dialog">
      <form method="dialog" id="status-form">
        <h2>Change Status</h2>
        <div class="status-options">
          <button value="ACTIVE" class="btn-status status-active">Active</button>
          <button value="ON_HOLD" class="btn-status status-on_hold">On Hold</button>
          <button value="COMPLETED" class="btn-status status-completed">Completed</button>
          <button value="ARCHIVED" class="btn-status status-archived">Archived</button>
        </div>
        <div class="dialog-actions">
          <button value="cancel">Cancel</button>
        </div>
      </form>
    </dialog>
  </div>
</body>

</html>
